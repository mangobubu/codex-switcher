name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            arch: "aarch64"
          - platform: "macos-15-intel"
            args: "--target x86_64-apple-darwin"
            arch: "x64"
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            arch: "universal"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Rename macOS assets for architecture
        if: startsWith(matrix.platform, 'macos')
        run: |
          ARCH="${{ matrix.arch }}"
          echo "Detected architecture: $ARCH"
          cd src-tauri/target/*/release/bundle/macos/

          if [ -f "Codex Switcher.app.tar.gz" ]; then
            mv "Codex Switcher.app.tar.gz" "Codex Switcher_${ARCH}.app.tar.gz"
            if [ -f "Codex Switcher.app.tar.gz.sig" ]; then
              mv "Codex Switcher.app.tar.gz.sig" "Codex Switcher_${ARCH}.app.tar.gz.sig"
            fi
            echo "Renamed assets to append Arch: $ARCH"
          fi

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "release-assets-*"
          merge-multiple: true

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          git fetch --force --tags
          PREVIOUS_TAG="$(git tag --list "v*" --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)"

          {
            echo "# 更新日志 - ${TAG}"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "比较范围：\`${PREVIOUS_TAG}...${TAG}\`"
              echo
              echo "## 变更记录"
              COMMITS="$(git log "${PREVIOUS_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges || true)"
              if [ -n "${COMMITS}" ]; then
                echo "${COMMITS}"
              else
                echo "- 本次版本没有检测到普通提交。"
              fi
              echo
              echo
              echo "## 合并记录"
              MERGES="$(git log "${PREVIOUS_TAG}..${TAG}" --pretty=format:"- %s (%h)" --merges || true)"
              if [ -n "${MERGES}" ]; then
                echo "${MERGES}"
              else
                echo "- 本次版本没有检测到合并提交。"
              fi
            else
              echo "未找到上一个 tag，以下为当前版本提交："
              echo
              git log -1 --pretty=format:"- %s (%h)"
              echo
            fi
          } > CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/**/*
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
