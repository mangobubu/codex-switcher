name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            arch: "aarch64"
          - platform: "macos-15-intel"
            args: "--target x86_64-apple-darwin"
            arch: "x64"
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            arch: "universal"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Rename macOS assets for architecture
        if: startsWith(matrix.platform, 'macos')
        run: |
          ARCH="${{ matrix.arch }}"
          echo "Detected architecture: $ARCH"
          cd src-tauri/target/*/release/bundle/macos/

          if [ -f "Codex Switcher.app.tar.gz" ]; then
            mv "Codex Switcher.app.tar.gz" "Codex Switcher_${ARCH}.app.tar.gz"
            if [ -f "Codex Switcher.app.tar.gz.sig" ]; then
              mv "Codex Switcher.app.tar.gz.sig" "Codex Switcher_${ARCH}.app.tar.gz.sig"
            fi
            echo "Renamed assets to append Arch: $ARCH"
          fi

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: "release-assets-*"
          merge-multiple: true

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          git fetch --force --tags
          PREVIOUS_TAG="$(git tag --list "v*" --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "${TMP_DIR}"' EXIT

          : > "${TMP_DIR}/增加.md"
          : > "${TMP_DIR}/修复.md"
          : > "${TMP_DIR}/修改.md"
          : > "${TMP_DIR}/移除.md"
          : > "${TMP_DIR}/其他.md"

          if [ -n "${PREVIOUS_TAG}" ]; then
            RANGE="${PREVIOUS_TAG}..${TAG}"
            git log "${RANGE}" --reverse --pretty=format:%B > "${TMP_DIR}/commits.txt"
          else
            RANGE="${TAG}"
            git log -1 --pretty=format:%B > "${TMP_DIR}/commits.txt"
          fi

          while IFS= read -r line || [ -n "${line}" ]; do
            item="$(printf '%s' "${line}" | sed -E 's/^[[:space:]]*[-*][[:space:]]+//; s/^[[:space:]]+//; s/[[:space:]]+$//')"
            [ -z "${item}" ] && continue

            case "${item}" in
              "feat:"*|"新增"*|"增加"*|"支持"*|"加入"*)
                category="增加"
                ;;
              "fix:"*|"修复"*|"解决"*|"纠正"*)
                category="修复"
                ;;
              "remove:"*|"移除"*|"删除"*|"去掉"*)
                category="移除"
                ;;
              "chore:"*|"refactor:"*|"perf:"*|"style:"*|"docs:"*|"修改"*|"优化"*|"调整"*|"改进"*|"统一"*|"升级"*|"完善"*)
                category="修改"
                ;;
              "本地验证"*|"验证"*|"git diff"*|"npm.cmd"*|"cargo check"*)
                continue
                ;;
              *)
                category="其他"
                ;;
            esac

            item="${item#feat: }"
            item="${item#fix: }"
            item="${item#chore: }"
            item="${item#refactor: }"
            item="${item#perf: }"
            item="${item#style: }"
            item="${item#docs: }"
            item="${item#remove: }"
            printf -- "- %s\n" "${item}" >> "${TMP_DIR}/${category}.md"
          done < "${TMP_DIR}/commits.txt"

          write_section() {
            local title="$1"
            local file="${TMP_DIR}/${title}.md"
            echo "## ${title}"
            if [ -s "${file}" ]; then
              cat "${file}"
            else
              echo "- 无"
            fi
            echo
          }

          {
            echo "# 更新日志 - ${TAG}"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "从 ${PREVIOUS_TAG} 更新到 ${TAG}。"
            else
              echo "这是当前版本的首次发布说明。"
            fi
            echo

            write_section "增加"
            write_section "修复"
            write_section "修改"
            write_section "移除"
            write_section "其他"
          } > CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/**/*
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
